<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #141e30, #243b55);
            height: 100vh;
            color: white;
        }

        .form-box {
            max-width: 400px;
            margin: auto;
            margin-top: 80px;
            padding: 30px;
            border: 1px solid white;
            border-radius: 10px;
            background-color: rgba(0,0,0,0.5);
        }
    </style>
</head>

<body>

    <div class="form-box">
        <h3 class="text-center mb-3">Register Today</h3>
        <p class="text-center">Fill in the data below.</p>

        <form>
            <div class="mb-3">
                <input type="text" class="form-control" placeholder="Full Name">
            </div>

            <div class="mb-3">
                <input type="email" class="form-control" placeholder="E-mail Address">
            </div>

            <div class="mb-3">
                <select class="form-control">
                    <option>Position</option>
                    <option>Student</option>
                    <option>Teacher</option>
                </select>
            </div>

            <div class="mb-3">
                <input type="password" class="form-control" placeholder="Password">
            </div>

            <div class="mb-3">
                <label>Gender:</label><br>
                <input type="radio" name="gender"> Male
                <input type="radio" name="gender"> Female
                <input type="radio" name="gender"> Secret
            </div>

            <div class="mb-3">
                <input type="checkbox"> I confirm that all data are correct
            </div>

            <button class="btn btn-light w-100">Register</button>
        </form>
    </div>

</body>
</html>
